<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BATTLE CITY</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="container">
        <h1>BATTLE CITY</h1>
        <p class="subtitle">Уничтожьте всех вражеских танков и защитите базу!</p>
        
        <div class="game-container">
            <canvas id="gameCanvas" width="624" height="624"></canvas>
            <div class="game-over" id="gameOverScreen">
                <h2 id="gameOverTitle">ИГРА ОКОНЧЕНА</h2>
                <p id="gameOverMessage"></p>
                <div>
                    <button class="btn" id="restartButton">ИГРАТЬ СНОВА</button>
                    <button class="btn" id="nextLevelButton" style="display:none;">СЛЕДУЮЩИЙ УРОВЕНЬ</button>
                </div>
            </div>
        </div>
        
        <div class="info-panel">
            <div class="info-item">
                <span class="info-label">ТАНКИ</span>
                <span class="info-value" id="tanks-counter">0/20</span>
            </div>
            <div class="info-item">
                <span class="info-label">ЖИЗНИ</span>
                <span class="info-value" id="lives-counter">3</span>
            </div>
            <div class="info-item">
                <span class="info-label">УРОВЕНЬ</span>
                <span class="info-value" id="level-counter">1</span>
            </div>
            <div class="info-item">
                <span class="info-label">ОЧКИ</span>
                <span class="info-value" id="score-counter">0</span>
            </div>
            <button class="toggle-llm" id="toggleLlmBtn">🟢 LLM: ВКЛ</button>
            <span class="fps-indicator" id="fpsIndicator">FPS: --</span>
        </div>
    </div>

    <div class="mobile-controls">
        <div class="joystick">
            <div class="joystick-base"></div>
            <div class="joystick-stick"></div>
        </div>
        <button class="fire-button">🔥</button>
    </div>

    <div class="commander-comment" id="commanderComment">
        <div class="commander-avatar">⚔️</div>
        <p id="commentText"></p>
    </div>
    
    <div class="tooltip" id="tooltip"></div>

    <script type="module" src="js/main.js"></script>
</body>
</html>
